<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GOATEDBUY Admin Console</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="admin-body">
  <div class="shell">
    <aside class="sidebar admin-sidebar">
      <div class="brand">
        <div class="brand-mark admin-mark">A</div>
        <div>
          <strong>GOATEDBUY</strong>
          <span>Admin console</span>
        </div>
      </div>
      <nav class="nav admin-nav" id="admin-nav"></nav>

        <span>Operations surface for order, warehouse, shipping, wallet, policy, risk, and audit workflows.</span>
      </div>

    <main class="main">

          <p class="eyebrow">Internal operations console</p>
          <h1 id="admin-title">Overview</h1>

        <span>Backend MVP</span>
        <p>Login to the backend API to load permission-gated admin queues.</p>

      <section id="admin-view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <script src="./admin.js"></script>
