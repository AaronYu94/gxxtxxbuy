name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare public site
        run: |
          mkdir _site
          cp -R app/. _site/
          # config.js is a gitignored per-environment override, so it is absent
          # from the checkout. Materialize the public template so client.html's
          # ./config.js reference resolves instead of 404ing.
          cp app/config.example.js _site/config.js
          cp app/client.html _site/index.html

      - name: Upload frontend
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
